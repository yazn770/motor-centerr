<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motor Center</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
}

.header {
  background: linear-gradient(90deg, #ff6600, #ff3300);
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  padding: 10px;
}

.card {
  background: #1a1a1a;
  margin: 10px 0;
  padding: 10px;
  border-radius: 15px;
  cursor: pointer;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.price {
  color: orange;
  font-size: 18px;
}

.btn {
  display: block;
  background: orange;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
  margin-top: 10px;
  text-decoration: none;
  color: white;
}

/* صفحة التفاصيل */
#details {
  display: none;
}

.back {
  margin: 10px;
  cursor: pointer;
  color: orange;
}
</style>
</head>

<body>

<div class="header">Motor Center 🔥</div>

<div class="container" id="home">

  <div class="card" onclick="showDetails('Honda 2022',1200,'https://images.unsplash.com/photo-1518655048521-f130df041f66')">
    <img src="https://images.unsplash.com/photo-1518655048521-f130df041f66">
    <h3>Honda 2022</h3>
    <div class="price">$1200</div>
  </div>

  <div class="card" onclick="showDetails('Yamaha 2021',1000,'https://images.unsplash.com/photo-1503376780353-7e6692767b70')">
    <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
    <h3>Yamaha 2021</h3>
    <div class="price">$1000</div>
  </div>

</div>

<div id="details">
  <div class="back" onclick="goBack()">⬅ رجوع</div>
  <img id="dimg" style="width:100%">
  <h2 id="dname"></h2>
  <div class="price" id="dprice"></div>

  <a class="btn" id="whatsapp">تواصل واتساب</a>
</div>

<script>
function showDetails(name, price, img){
  document.getElementById("home").style.display="none";
  document.getElementById("details").style.display="block";

  document.getElementById("dname").innerText = name;
  document.getElementById("dprice").innerText = "$"+price;
  document.getElementById("dimg").src = img;

  document.getElementById("whatsapp").href =
  "https://wa.me/967XXXXXXXXX?text=اريد "+name;
}

function goBack(){
  document.getElementById("home").style.display="block";
  document.getElementById("details").style.display="none";
}
</script>

</body>
</html>
